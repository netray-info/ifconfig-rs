---
name: Build Docker Image for Prod

on:
  push:
    branches: ["prod"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff9f9a9e541e1e5f5b # v3.6.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5730e9c2d2e6c59ca7b06ee5bc8c6d1e9ae6f3d # v3.10.0
      - name: Log into registry GHCR
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ghcr.io
          username: lukaspustina
          password: ${{ secrets.LP_GHCR_TOKEN }}
      - name: Build and push Docker images
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/lukaspustina/ifconfig-rs:latest
      - name: Install Koyeb CLI
        env:
          KOYEB_CLI_VERSION: "5.9.1"
        run: |
          curl -fsSL -o koyeb-cli.tar.gz \
            "https://github.com/koyeb/koyeb-cli/releases/download/v${KOYEB_CLI_VERSION}/koyeb-cli_${KOYEB_CLI_VERSION}_linux_amd64.tar.gz"
          tar xzf koyeb-cli.tar.gz
          install -m 755 koyeb /usr/local/bin/koyeb
      - name: Trigger Koyeb redeploy
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_API_TOKEN }}
        run: koyeb service redeploy ip.pdt.sh/ifconfig-rs
