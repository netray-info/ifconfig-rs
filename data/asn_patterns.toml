# --- ASN-number entries (exact match, checked before org-name patterns) ---
# Use these for providers whose org name is ambiguous or changes frequently.
# Both `asn` and `pattern` may coexist in one entry — ASN takes priority.

[[hosting]]
provider = "Cloudflare"
asn = 13335

[[hosting]]
provider = "Google"
asn = 15169

[[vpn]]
provider = "Mullvad"
asn = 39351

[[hosting]]
asn = 48152
provider = "Digital Realty Frankfurt GmbH"
