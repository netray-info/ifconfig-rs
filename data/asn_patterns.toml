# ASN organization name classification patterns for ifconfig-rs.
# Patterns are case-insensitive regexes matched against the ASN org name
# (input is lowercased before matching).
# Listed in order: more specific named providers first, generic keywords last.
# Dots in provider names must be escaped as \\. to match literally.

# Hosting / datacenter providers

