# Base URL / public domain used in curl examples.
base_url = "localhost"
# Display name shown in the site header, footer, and FAQ.
site_name = "ip.pdt.sh"
project_name = "ifconfig-rs"
geoip_city_db = "data/GeoLite2-City.mmdb"
geoip_asn_db = "data/GeoLite2-ASN.mmdb"
user_agent_regexes = "data/regexes.yaml"
tor_exit_nodes = "data/tor_exit_nodes.txt"
cloud_provider_ranges = "data/cloud_provider_ranges.jsonl"
feodo_botnet_ips = "data/feodo_botnet_ips.txt"
vpn_ranges = "data/vpn_ranges.txt"
datacenter_ranges = "data/datacenter_ranges.txt"
bot_ranges = "data/bot_ranges.jsonl"
spamhaus_drop = "data/spamhaus_drop.txt"

# Regex patterns to exclude from /headers responses (matched against header names).
filtered_headers = ["^x-koyeb-", "^cf-"]

# Watch data file directories for changes and auto-reload (like SIGHUP).
# Useful for Kubernetes/Docker deployments with geoipupdate.
# watch_data_files = false

[server]
bind = "127.0.0.1:8080"
admin_bind = "127.0.0.1:9090"

[rate_limit]
per_ip_per_minute = 60
per_ip_burst = 10

[batch]
enabled = true
max_size = 100
