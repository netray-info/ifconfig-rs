---
name: Build Docker Image for Prod

on:
  push:
    branches: ["prod"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Log into registry GHCR
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ghcr.io
          username: lukaspustina
          password: ${{ secrets.LP_GHCR_TOKEN }}
      - name: Build and push Docker images
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          push: true
          tags: ghcr.io/lukaspustina/ifconfig-rs:latest
      - name: Trigger Koyeb redeploy
        env:
          DEPLOY_HOOK: ${{ secrets.KOYEB_DEPLOY_HOOK }}
        run: curl -s -X POST "$DEPLOY_HOOK"
