  <line x1="16" y1="23.5" x2="16" y2="28.5" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
  <line x1="3.5" y1="16" x2="8.5" y2="16"  stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
  <line x1="23.5" y1="16" x2="28.5" y2="16" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>

