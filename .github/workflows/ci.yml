---
name: Continous Integration

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - name: Build Frontend
        run: cd frontend && npm ci && npm run build
      - name: Cargo Check
        run: cargo check --verbose

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - name: Build Frontend
        run: cd frontend && npm ci && npm run build
      - name: Cargo Clippy
        run: cargo clippy --verbose

  fmt:
    name: Cargo Fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Cargo Fmt
        run: cargo fmt  --check --verbose

  build-n-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - name: Build Frontend
        run: cd frontend && npm ci && npm run build
      - name: Cargo Build
        run: cargo build --verbose
      - name: Cargo Unit Test
        run: cargo test --lib --no-fail-fast
      - name: Cargo Integration Test
        run: cargo test --test ok_handlers --test error_handler --test rate_limit --no-fail-fast

  integration-test:
    needs: [check, build-n-test]
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Log into registry GHCR
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ghcr.io
          username: lukaspustina
          password: ${{ secrets.LP_GHCR_TOKEN }}
      - name: Build Docker Image and Run Tests
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          file: tests/Dockerfile.tests
          context: .
          push: false

  e2e-test:
    needs: [check, build-n-test]
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Log into registry GHCR
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ghcr.io
          username: lukaspustina
          password: ${{ secrets.LP_GHCR_TOKEN }}
      - name: Build Docker image
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          push: false
          load: true
          tags: ifconfig-rs:e2e
      - name: Start server
        run: docker run -d -p 8000:8000 --name ifconfig-rs ifconfig-rs:e2e
      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health && echo " ready" && break
            echo "Waiting... ($i/30)"
            sleep 2
          done
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - name: Install Playwright browsers
        run: cd tests/e2e && npm ci && npx playwright install --with-deps
      - name: Run E2E tests
        env:
          BASE_URL: http://127.0.0.1:8000
        run: cd tests/e2e && npx playwright test --reporter=list
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --quiet
      - name: Cargo Audit
        run: cargo audit
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - name: NPM Audit (frontend)
        run: cd frontend && npm audit --audit-level=high
      - name: NPM Audit (e2e)
        run: cd tests/e2e && npm audit --audit-level=high
