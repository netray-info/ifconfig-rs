# ifconfig-rs configuration
#
# All values can be overridden via environment variables with the prefix
# IFCONFIG_ and separator __ (e.g. IFCONFIG_BASE_URL, IFCONFIG_SERVER__BIND).

# Base URL / public domain name, used in curl examples.
# Default: "localhost"
base_url = "ip.pdt.sh"

# Display name shown in the site header, footer, and FAQ.
# If omitted, defaults to base_url.
site_name = "ip.pdt.sh"

# Project name returned by the /meta endpoint.
# Default: "ifconfig-rs" (from Cargo.toml)
# project_name = "ifconfig-rs"

# Project version returned by the /meta endpoint.
# Default: crate version from Cargo.toml — no need to set this manually.
# project_version = "0.8.0"

# Path to MaxMind GeoLite2 City database (.mmdb).
# If omitted, geolocation lookups are disabled.
geoip_city_db = "data/GeoLite2-City.mmdb"

# Path to MaxMind GeoLite2 ASN database (.mmdb).
# If omitted, ISP/ASN lookups are disabled.
geoip_asn_db = "data/GeoLite2-ASN.mmdb"

# Path to ua-parser regexes YAML file.
# If omitted, User-Agent parsing is disabled.
user_agent_regexes = "data/regexes.yaml"

# Path to a newline-delimited list of Tor exit node IPs.
# If omitted, Tor exit node detection is disabled.
tor_exit_nodes = "data/tor_exit_nodes.txt"

# Path to normalized JSONL file of cloud provider CIDR ranges.
# Each line: {"cidr":"...","provider":"...","service":"...","region":"..."}
cloud_provider_ranges = "data/cloud_provider_ranges.jsonl"

# Path to a newline-delimited list of Feodo botnet C2 IPs.
feodo_botnet_ips = "data/feodo_botnet_ips.txt"

# Path to a newline-delimited list of VPN CIDR ranges.
vpn_ranges = "data/vpn_ranges.txt"

# Path to a newline-delimited list of datacenter CIDR ranges (from X4BNet).
datacenter_ranges = "data/datacenter_ranges.txt"

# Path to a JSONL file of known bot CIDR ranges.
# Each line: {"cidr":"...","provider":"..."}
bot_ranges = "data/bot_ranges.jsonl"

# Path to Spamhaus DROP+EDROP+DROPv6 combined CIDR list.
spamhaus_drop = "data/spamhaus_drop.txt"

# Regex patterns matched against header names. Any header whose name matches
# a pattern is excluded from /headers responses. Useful for hiding infrastructure
# headers injected by hosting providers.
filtered_headers = ["^x-koyeb-", "^cf-"]

# Watch data file directories for changes and auto-reload enrichment data.
# Useful for Kubernetes/Docker deployments where geoipupdate writes new files.
# Default: false
# watch_data_files = true

[server]
# Address and port to bind the HTTP server to.
bind = "0.0.0.0:8000"

# Admin port serving Prometheus /metrics and /health.
# Not rate-limited — protect via network policy or admin_token.
admin_bind = "127.0.0.1:9090"

# Bearer token required for all admin port requests.
# Uncomment and set to restrict access to the admin port.
# admin_token = "change-me"

# List of trusted proxy CIDR ranges for X-Forwarded-For parsing.
trusted_proxies = ["10.0.0.0/8"]

# Allowed origins for CORS. Default: ["*"] (allow all origins).
# cors_allowed_origins = ["*"]

[rate_limit]
# Maximum sustained requests per IP per minute.
# Default: 60
per_ip_per_minute = 60

# Burst capacity — requests allowed in a quick burst before rate limiting kicks in.
# Default: 10
per_ip_burst = 10

[batch]
# Enable the POST /batch endpoint for bulk IP lookups.
enabled = true

# Maximum number of IPs per batch request. Each IP consumes one rate-limit token.
max_size = 10
